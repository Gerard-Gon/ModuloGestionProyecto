services:
  test-gestion-proyectos:
    build: 
      context: .
      dockerfile: Dockerfile.test
    container_name: test-app-proyecto
    environment:
      # Aunque usemos H2, pasamos variables por si alguna clase las exige al arrancar
      - DATABASE_URL=jdbc:h2:mem:testdb
      - DATABASE_USERNAME=sa
      - DATABASE_PASSWORD=
      - USUARIOS_SERVICE_URL=http://localhost:9999
      - GATEWAY_SECRET=test_secret